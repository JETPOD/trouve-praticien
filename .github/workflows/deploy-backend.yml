name: Deploy backend to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'app/server/**'
      - 'app/shared/**'
      - 'app/Dockerfile'
      - 'app/fly.toml'
      - 'app/scripts/entrypoint.sh'
      - 'app/package.json'
      - 'app/package-lock.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Build SQLite database"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    # Skip si le workflow déclencheur (build-db) a échoué
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    concurrency:
      group: deploy-fly
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: app
        run: flyctl deploy --remote-only --strategy=rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Vérification post-deploy
        run: |
          set -e
          echo "Attente démarrage du service…"
          for i in {1..20}; do
            if curl -sf -o /dev/null https://trouve-praticien-api.fly.dev/api/stats; then
              echo "✅ Backend opérationnel"
              curl -s https://trouve-praticien-api.fly.dev/api/stats
              exit 0
            fi
            sleep 10
          done
          echo "❌ Backend ne répond pas après 200s"
          exit 1
